<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background: #FAFAF9; 
            display: flex;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #57534E;
        }
        .left-column {
            width: 65%;
            padding: 120px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-column {
            width: 35%;
            background: #D97706;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            color: #292524;
            line-height: 1.1;
            margin-bottom: 24px;
            font-weight: 700;
        }
        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #4D7C0F;
            line-height: 1.3;
            margin-bottom: 48px;
            font-weight: 700;
        }
        .body-text {
            font-size: 20px;
            line-height: 1.6;
            max-width: 600px;
        }
        .decorative-letter {
            font-family: 'Playfair Display', serif;
            font-size: 400px;
            color: rgba(250, 250, 249, 0.15);
            font-weight: 700;
            line-height: 1;
        }
        .accent-line {
            width: 80px;
            height: 4px;
            background: #D97706;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="left-column">
            <div class="accent-line"></div>
            <h1 class="main-title">Ali Wholesale SaaS</h1>
            <h2 class="subtitle">AI-Powered Sales and Delivery Platform for Wholesale Food Distribution</h2>
            <p class="body-text">Transforming a manual wholesale operation into an automated lead-to-delivery pipeline using AI voice agents, real-time credit checking, and territory-based logistics.</p>
        </div>
        <div class="right-column">
            <div class="decorative-letter">A</div>
        </div>
    </div>
</body>
</html>
